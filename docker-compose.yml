version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-app
    networks:
      - laravel-network
    depends_on:
      - db
  
  db:
    image: mysql:8.0
    container_name: laravel-db
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    networks:
      - laravel-network
    volumes:
      - db-data:/var/lib/mysql

networks:
  laravel-network:
    driver: bridge

volumes:
  db-data:
version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-app
    networks:
      - laravel-network
    depends_on:
      - db
  ports:
      - "8000:8000"  # ← ДОБАВИТЬ эту строку
  command: php artisan serve --host=0.0.0.0 --port=8000  # ← ДОБАВИТЬ эту строку
  db:
    image: mysql:8.0
    container_name: laravel-db
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    networks:
      - laravel-network
    volumes:
      - db-data:/var/lib/mysql

networks:
  laravel-network:
    driver: bridge

volumes:
  db-data: